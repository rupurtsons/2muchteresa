I don’t want all of my skin revealed ever, 
even when I’m having sex; 
I hate it when all of my skin is revealed. 
I hate having to take my clothes off to shower, 
not because I can’t look at my own body, 
but mainly because it is cold. 
I hate it when I walk outside, 
and the sharp bitterness of the wind grips my fingers. 
My silver jewelry grows icy, 
like stepping into a freezer. 
When I cook, and my thin, 
calcium deficient fingernails meet the boiling steam, 
they burn. When I work, my fingers are bathed in sweat. 
When I love, 
I touch 
I want to grip on,
 trace my fingertips over each and every detail, 
 into each and every groove, 
 I want to absorb all that I can
 where are your callices? 
 Your hairs? 
 Where is the rust? 
 I trace my fingers over the grains, 
 gently, avoiding splinters. 
 I don’t mind the splinters, 
 the blood blisters, 
 the scrapes, 
 the burns. 
 I want to find them. 
 I hate the dirt, 
 but I’ll dig my nails into sand to search for it. 
 I want to meet you with my fingertips. 
 The silkiness of your fur, 
 then trace my hands back to the leather behind your back, 
 up to the bumpy brick walls behind you, 
 then back down to the smooth, warm wood under your feet. 


I want to fall asleep to the sound of a heartbeat, 
slowing my own breathing to match theirs. 
Each inhale and exhale, 
chasing behind them as I walk myself into a world of my own manipulation. 
My skin to your fur. 
Each night when I fall asleep, 
I try to make up my own fictional world. 
Last night I fell asleep trying to form sentences in Bahasa. 
The night before that, 
I fell asleep drunk and high, 
in that state where, 
with every breath I take, 
I fall down another step with ringing in my ears, 
my tongue sour with the remnants of my stomach acid crawling its way back up my throat. 
The light show plays behind my eyelids. 
Each night’s fictional worlds built up of whatever remnants of the day that lingered unresolved.

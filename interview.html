  <textarea id="funkyText" style="display:none;">
1- Russ as Teresa 
2- Teresa as Self 

If you could have your work live somewhere forever, where would it live?

1. I live in a cave. Someone could find it, 
I hope people could find it, 
but I wouldn't tell them where it is. 

2. I don’t care really, 
but I usually design my items imagining them sitting in a fashion showroom in Soho. 
If I were thinking emotionally I would want to give my pieces to loved ones or whoever I think whould cherish my pieces the most. 


If you were a master of every single craft in the world, would your work still look the way it does now? 

1. I think that, yes, overall, the visual style of my work is part of me, not part of craft methods, so the things I make would look the same if I were a master of every craft. Structure would be better and give me more control, but overall, my visual language comes more from heart than craft limits. I think I am also pretty bold about working with new materials and techniques, and quick to learn,  so I don't let that stop me. 

2. No, I think I often design with my maker abilities in mind. I don’t feel as strongly about my craft abilities as I do about some of my other strengths. I think I have a good understanding of form and conceptual framing, but if I were a master craftsperson, I would design my items more whimsically. 


If you could choose a theme song for your work, what would it be?
1. I love the internet and meme music — something loud and colorful, like nyancat — that plays on my website. My work is Joy Division—dark, brooding music concept—calls on history, taking sounds from the world in the order they happen, and treating them beautifully.

2. “November, 1st in Detroit” by Slow Attack Enssemble. I think my work visually is very dark and cavelike, but recently someone explained to me that it's like fog on a window. It's cold on the outside, but when you’re looking in, it comes from a place of warmth, and so you are the fog in between. This song reminds me a lot of fog, but specifically fog on a car window that you lay your face on while someone is driving you very early in the morning. 


What color is your work?

1. Black, but in a raw, hot rolled steel, not just black color and texture, the color of the side of a volcano. Volcanoes have a lot of stuff happening inside, as my work does, and I wonder if the inside of a volcano has a color?

2. I think my work is the reddish brown of rust, but I agree that my work would be better explained as a texture more than just one solid color. 

If your work could speak one word like a Pokémon, what would it say?

1. “GYA” - me, not my work. My work would sound like a grumble roaring noise, but I could also say go away – but come here, like a tsundere. My work is like a riddle – more like a puzzle box than a word. My work is like a cave to go through in Pokémon more than the work itself says, and maybe if my work had only to say one word, it would be ah! of revelation and relief that could be put into words. 

2. If my work could only say one word, it would be “really?”. Lots of my recent work has had themes of secrecy but overall I think most of it has been a challenge. It would be a “really” in a sassy “oh is that so” way. 


If you could ban someone from ever interacting with your work, who would it be?
1. My dad???? deflecting the question: I make things for myself; I don't want anyone to see them. 

2. My parents don’t understand my work but I don’t understand what my dad does for work, so it's ok since it goes both ways. I want my parents to interact with my work; I don’t have a problem with them. If I had to choose someone to never interact with my work, it would probably be a teacher who was mean to me in the past. My 6th grade history/literature teacher was a giant bully, and I still hate her. 


If you had to cut off one limb of your loved one, which one would it be? 

1. Why just pick one?!

2. The left ring toe. 


Who do you think you were in your past life?

1. A spy. I am naturally secretive, enjoy working in code; there's a craft to the profession of spying, relying on tools, knowledge, and technology, and it also involves a lot of uncertainty. I don't know who to trust. 

2. I think I was an ancient Chinese craftsperson from the arts school. I often reference horses in my work as a silent rebellion, and it's a reference to Gong Kai’s “Emaciated Horse”. It’s not an obvious reference, so I always find it funny to do. 


If you could be reincarnated in someone else’s life, would you still choose to be an artist/designer?

1. I'm not sure if I could be an artist in someone else’s life because my work is so personal. Do I become that person? Are they interesting? If I were them, then wouldn't I just stay in their life? Why change it? I wouldn't be able to imagine working as someone else. 

2. No, I wouldn’t want to. If I could start over, I would have kept it as a hobby.


You have a bag of assorted snacks, but one of them is disgusting. In what order would you eat the snacks in the bag?

1. No favorite first, eat average ones first, and then save the worst for last, but pretend it doesn’t exist, and save “best for last” and don't eat the disgusting ones.

2. I eat all the bad ones super fast and then I eat the best ones mixed in with the ok ones but leave most the best ones for last. 

If you were stuck in a time loop, reliving one day, which day would you want?

1. After class, sitting at my work bench playing with stuff with Razan, making our horse leather wallets, working, and coexisting with the cats and it was just nice. 

2. Probably back to a day from a weekend from last year, between April and June of last year, when I was still living in my Fidi apartment with Razan and the cats.

What smell is your work?

1. metallic, but more abstractly like a furnace can smell the heat in a furnace heat is associated with welding, but it's also further associated with passion, and I am passionate, and you can't look inside a furnace, but there's a lot happening, and it is very hot, not an open fire, that's a different smell, furnaces smell like dry heat 

2. I think because my work is mostly metal, it would make sense that my work would smell like rust, but I think more of an antiques shop mixed in with undertones of incense and oud. 


Do you have a character from any sort of media that you think shaped you as a person?

1. kikis delivery service 

2. I am like a blend of Kotoko from Mischievous Kiss: Love in Tokyo, Faye Wang’s character in Chungking Express, and Clementine from Eternal Sunshine of the Spotless Mind. 


What’s your childhood deep, dark secret? 

1. i was a perfect child and then i wonder when it changed - i wonder when i stated to become more aware of other people's perceptions of me because secrets don't exist before you realize other people can see you as an independent person with agency and i dont think you get to have secrets until that moment of awareness since then i have many secrets but theyre not really deep or dark they're just not meant to be discussed they're just i rather practice care for myself and those secrets and if it was I wouldnt tell you anyways. 

2. Why would I tell you that :P! 


What do you want to happen to your body after you die?

1. I want people who love me to bury me, but I want them to do it with their own hands, and I want to become trees, mushrooms, and grass, not in a cemetery 

2. I don’t know, I think its easier if I didn’t worry about this. I don’t think I care, thats beyond me at that point I am dead why does it matter!

Exoskeleton, murky, gothic brutalism, princess, feline. 

My dream life is to live in a forest on a hill, 
somewhere far from most of civilization 
but within an hour's drive of a major city. 
A house with a fence smart enough
to prevent my cats from escaping, 
with a large backyard 
for all my animals to run around in. 
I want a farm with chickens, goats, and lambs, 
and a large garden with so many fruits and vegetables 
that I could satisfy any food craving by going out 
to my backyard and then cooking with Razan in our large kitchen. 
I want two kids, doesn’t matter what gender. 
And I don’t need a hundred friends, 
just one or two is enough, 
but I want to live close to them. 
I want a small shop, 
I don’t need much: 
a workbench, 
a welder, 
a torch, 
a sanding area, 
and maybe a small bandsaw. 
I want to forever sleep on a full sized bed with my lover. 
Full size and not queen or king 
because a full sized bed is big enough that you can fit two people comfortably, 
but it's small enough 
that you’re still kind of forced to huddle together, 
and no matter how you turn, 
you’re close enough that one part of your bodies is still touching. 


I want to be woken up every morning 
with sweat around my face 
from the bright sun that breaks into the room through the curtains. 
I want my bedsheets to always fit my mattress perfectly. 
I want my bed to stay in place so my pillows stay upright. 
I want my couch to reject my presence after a few hours. 
I want the shower to stay warm while I’m washing my hair, 
and the steam in the bathroom to stay warm while I’m drying myself off. 
I want my vents to never smell like smoke. 

I want a room with a giant screen, 
surround-sound speakers, and a nice, 
fluffy couch that you sink into 
like quicksand with each minute you sit there. 
I want one of those soda machines from movie theaters 
with all the different flavors. 
I want a room with a bar 
stocked up with ingredients to make all of my favorite cocktails. 
I want that same room to turn into a cafe area during the day, 
with an oven that magically bakes whatever I am craving that morning. 
I want to live far away enough from everyone 
that if I blasted my music super loud all the time, 
it wouldn’t be a bother. 
I want a really nice, 
fluffy carpet that cleans itself of all the litter tracked around the house. 
I want it to be spring forever, 
but the time of spring where the leaves have just grown back, 
flowers have just blossomed, 
and the temperature is permanently at 72 degrees Fahrenheit. 
I want fireworks every night, 
and I want to be able to watch them from every window in the house. 
I want a teleportation portal installed in the 
living room so I can go wherever I want, 
whenever I want, and bring friends and family over anytime I wish. 
I want my blankets and pillow to be the perfect temperature every night. 
I want my wifi to work.

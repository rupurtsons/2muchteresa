I hated waking up every Sunday morning at 8 a.m. for church. 
Every week, we would sit in those lime green plastic chairs, 
listening to someone whose entire livelihood depended on wealthy 
Silicon Valley families caught up in a mass religious fervor. 
Pastor R, who I later learned was fired for bringing a knife to a sermon, 
gave his lectures based on whatever political event was happening in the world at the time. 
I detested this man, whose every opinion was backed by Bible passages I couldn’t even comprehend at age 12.


They were filled with complex words that made me pause and slowly mouth each one.
I remember the week gay marriage was legalized; he went on an hour long rant 
about how wrong it was and insisted there were invisible rules that seemed to 
apply only to those who desperately wanted to love as they wished. 
I had my first period at church, in those lime green chairs, 
while the pastor ranted about sinners. I left behind a bright red puddle of blood in the pattern of my denim jeans. 
Belinda and I always mocked christians for blindly trusting and devoting their entire lives to a single book, 
a book that has been rewritten and translated so many times. When I asked my pastor which version of the 
bible was most accurate and which branch of christianity we followed, he paused and then replied that he did not know.
I remember sitting at Belinda’s funeral, behind her family's pastor, watching him draft his speech on an empty Google Doc. 
He stumbled over spelling and grammar errors, deleting sentences and rewriting them. Three sentences were written right before he was about to go up to the podium.
	

My happiest memories have all been moments I’ve spent with people I love. 
In high school, Belinda and I would go to Tea Top every Tuesday after school. 
We would sit there for hours over a cup of tea, sharing every detail of our lives: 
the boys we liked, the people we hated, and the current political climate at our school. 
We would rant about our families, our classes, and the friends we were no longer close to, 
along with the reasons why.
I remember one particular moment when she asked me if I knew what I wanted to do with my life.
At that time, I didn’t have a clue. I was barely passing most of my classes, 
and none of my teachers seemed to like me. The only subject I excelled in was art, 
though I had never formally learned any skills, so most of my work involved patience 
rather than technique. Belinda, on the other hand, was a straight-A student taking 
several AP classes, involved in honors clubs, and was loved by everyone. 
She wanted to go to nursing school, while I just wanted to find a way to survive. 
We had a similar conversation again one time at McDonald’s. 
Though I don’t remember the exact details of our discussion, 
I sensed that she was encouraging me to work harder for my future. 
While we were there, the cashier, who was one of our classmates’ sisters, 
must have noticed how stressed I was, because she brought me a McFlurry.


I learned about unconditional love when I adopted Yuumi. 
He has moved with me five different times, 
between houses, apartments, and cities, from San Jose to New York to Providence. 
He has traveled with me on planes, trains, cars, and boats, 
despite his intense fear of new people and places. 
He has been there for me through everything. 
I remember one time when I accidentally kicked him while I was drunk and hunched over the toilet puking. The next morning, 
I woke up to find him checking on me, and I could see his body relax once he realized I was okay.
Yuumi sleeps by my feet, keeping watch over the door to make sure no one attacks us. 
When I’m sick, he gets worried and eats less. 
When I am depressed and stuck in bed, he sits by my bedroom door and meows at me until I finally get up. 
After I was rejected from Yale and cried my eyes out, 
he jumped up next to me, meowing concernedly, and stayed there until I stopped crying. 
My friends often tease Yuumi for being so socially anxious. 
He is usually hidden in the deepest corner under the bed when anyone is over. 
When Razan started coming by more often before we started dating, 
Yuumi, for the first time, sat in someone else’s lap without being forced to.


My favorite vacation I’ve ever taken was this short trip Razan and I took up to Montauk. 
I had watched The Eternal Sunshine of the Spotless Mind a few months prior and woke up one morning, 
suddenly craving adventure. We went in April, 
just a few weeks before Montauk transformed into a party getaway for the wealthy. 
The town was nearly empty, and at every corner we turned, 
we saw apartments under construction or hotels preparing to open. 
We were among the few people exploring. 
The whole city was empty, and we were among the few people walking around. 
I had never liked the beach: 
I hated the cold, the wind, and how sand would get stuck to every part of my body and in every pocket or bag I owned. 
I changed my mind!
The beaches were almost deserted, 
the waves roared, 
and we huddled together to keep warm against the salty wind. 
There was nothing but each other’s company, 
and for those few days, we spent our time pointing out things we saw and sharing stories about each one. 
We walked to the beach in the dark, our last night there, 
and while I was already scared enough from the dark, 
Razan started telling me ghost stories. 
I forced him to run back to the hotel with me, 
and we ate cup noodles made with water we boiled in a coffee maker.

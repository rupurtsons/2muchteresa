<audio id="pageSong" src="DrumTrack.mp3" loop preload="auto"></audio>

<script>
  window.addEventListener("load", () => {
    const song = document.getElementById("pageSong");
    if (!song) return;

    song.volume = 0.6;

    song.play().catch(() => {
      document.addEventListener("click", () => {
        song.play();
      }, { once: true });
    });
  });
</script>

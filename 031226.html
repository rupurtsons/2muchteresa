      its funny that my work reads as decay 
it is something that i think a lot about 
ive done a lot of thinking that I haven't written down this week 
mainly because i was busy 
things die 
everything dies 
As artists i think a lot of what we strive for is immortality 
My undergrad thesis project was about gaining immortality through our belongings 
I gathered a lot of momentos from estate sales, presumably from people no longer with us 
I developed abandoned Super 8 family films, and each moment was strangely nostalgic 
moments from Christmas, a baby’s first steps, a day out at the pool 
i later discovered a lot of the film was around this haunted lake in Virginia

I used to be super afraid of death 
But more specifically, what happened to my body after I died 
When Belinda was still alive, before she got sick, 
We had a conversation about how we wanted to be buried    
We both said we wanted to be buried in a casket 
Imagine my surprise when I sat down at her funeral and saw her in a little white 
and blue porcelain urn 

I have always been obsessed with owning a pet
I had fish when I was in elementary school 
Then, in high school, Belinda and I secretly adopted a hamster on her 15th birthday 
We named him Miimo
We took turns taking care of him, 
I would hide him in his enclosure in my closet, 
I had a walk-in closet in my room since I had moved into my late grandparents’ room a few years after they passed away. 
One day, my aunt walked into my room to look through some of my grandparents’ things in my closet, 
She found Miimo 
A few months after, Belinda had to surrender Miimo because he had a skin condition. 
A few months after I moved to New York, I moved in with my then-boyfriend
He was addicted to video games, and I would get lonely,
So he adopted a bunny for me for my birthday that year. 
I loved that bunny; his name was Mellow 
I loved him so much 
We spent every moment with each other every time I was home, 
But he wasn’t allowed in the bedroom because he had accidents sometimes, 
One morning I woke up and went to greet Mellow, 
he was lying flat in his enclosure, 
cold and rock hard. 
I cried for weeks, 
I didn’t process it fully, 
I put all of that sadness away, and I spent almost all of my waking hours at school. 
A few months after that, I adopted Yuumi, 
I love Yuumi. 
Yuumis will be immortal. 
Yuumi is straight up just not allowed to die ever. 
But Yuumi got sick one day, 
He randomly started drooling, 
and it wasn’t just a little, 
It was puddles of drool. 
I took him to the vet, and they said there was nothing wrong with him. 
They gave him some fluids and sent us home, 
Suddenly, then all of that suppressed depression and anxiety oozed out of me out of every single pore of my body. It was all I could think about for months. I couldn’t sleep more than an hour at night. Each time I fell asleep, I would jump awake and panic while I searched for Yuumi. I couldn’t go outside because every time I left, all I could think about was coming home to a corpse. Every time Yuumi was sitting in a different room, I would pause whatever I was doing and check on him. I bought pet cameras and would check them obsessively whenever there was a notification of movement. Yuumi was fine. I never figured out what happened and why he was drooling, but he went back to normal a few days after. But I didn’t go back to normal for a few months after that. 

I don’t expect to be a person who will be remembered more than 50 years after I die
I don’t think that I will ever do anything important enough to be remembered in history, 
I don’t think I will ever really achieve anything historically important; I didn’t exactly devote myself to creating anything like that. My entire few years if my adult life have just been me trying to find joy, 
I don’t expect that joy to ever result in anything crazy to have me memorialized in 100 years, 
And I have grown to be ok with that. 
I don’t think its important, 
at that point who cares? I’m dead, I won’t know anyway. If anything, I’ve learned that delusion is important in achieving happiness. 
Surrealists believed that madness was the gateway to a lot of creativity, 
I agree, 
If you took away my thoughts, I wouldn’t be able to make any of the work I have made. 
In that same mindset, if I delude myself into believing I am a lot more important than I am I think I will be happy as an artist. 
As an artist you make art for other artists, that’s the audience you’re trying to impress. 
The normal person does not care about why your work is made or what it is made of. 
The normal person is happy with a cheap print from a random second-hand shop, 
With a fluffy, soft, cheap couch from Facebook Marketplace. 
It does not matter 
Is that why we value history so much as art students? 
Because we want to be special 
and to be special, we must learn from other people we deem as special? 
I don’t think that it matters. 
At the end of the day we all die 
so I want to just make thing that make me happy, play with my cats, watch stupid tv shows and movies, 
Before I die I want to find so much joy in things that I laugh so much my face muscles make me as wrinkly as a bedsheet fresh out of the dryer.
